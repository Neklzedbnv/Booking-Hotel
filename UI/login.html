{{define "login.html"}}
<!DOCTYPE html>
<html lang="en" translate="no">
<head>
  <meta charset="UTF-8"/>
  <meta name="google" content="notranslate"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — Aurelian Hotel</title>
  <link rel="stylesheet" href="/public/css/style.css">
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="container">
      <a href="/" class="navbar-brand">Aurelian<span>.</span></a>
      <div class="navbar-links">
        <a href="/">Home</a>
        <a href="/rooms">Rooms</a>
        <a href="/booking">Booking</a>
        <a href="/contact">Contact</a>
      </div>
      <div class="navbar-actions">
        <a href="/register" class="btn btn-primary btn-sm">Register</a>
      </div>
    </div>
  </nav>

  <!-- LOGIN FORM -->
  <section class="section" style="min-height:70vh;display:flex;align-items:center;">
    <div class="container" style="max-width:450px;">
      <div class="card" style="padding:2.5rem;">
        <h2 class="text-center" style="margin-bottom:.5rem;">Welcome</h2>
        <p class="text-center" style="color:var(--color-text-secondary);margin-bottom:2rem;">Sign in to your account</p>

        <div id="loginRoot"></div>

        <p class="text-center" style="margin-top:1.5rem;color:var(--color-text-secondary);">
          Don't have an account? <a href="/register">Sign up</a>
        </p>
      </div>
    </div>
  </section>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="container">
      <div class="footer-bottom">
        <p>&copy; 2026 Aurelian Hotel &amp; Resorts.</p>
      </div>
    </div>
  </footer>

  <script type="text/babel" src="/public/js/login.jsx"></script>
</body>
</html>
{{end}}
