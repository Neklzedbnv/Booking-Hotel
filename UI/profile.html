{{define "profile.html"}}
<!DOCTYPE html>
<html lang="en" translate="no">
<head>
  <meta charset="UTF-8"/>
  <meta name="google" content="notranslate"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Profile — Aurelian Hotel</title>
  <link rel="stylesheet" href="/public/css/style.css">
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="container">
      <a href="/" class="navbar-brand">Aurelian<span>.</span></a>
      <div class="navbar-links">
        <a href="/">Home</a>
        <a href="/rooms">Rooms</a>
        <a href="/booking">Booking</a>
        <a href="/contact">Contact</a>
      </div>
      <div class="navbar-actions" id="navAuthProfile"></div>
    </div>
  </nav>

  <!-- PROFILE HEADER -->
  <section class="page-header">
    <div class="container">
      <span class="section-label">Personal Account</span>
      <h1 class="section-title">My Profile</h1>
      <p class="section-subtitle">Manage bookings and information.</p>
    </div>
  </section>

  <!-- PROFILE CONTENT -->
  <section class="section">
    <div class="container">

      <!-- React renders bookings + review form -->
      <div id="profileRoot"></div>

    </div>
  </section>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="container">
      <div class="footer-grid">
        <div>
          <p class="footer-brand">Aurelian<span>.</span></p>
          <p class="footer-desc">A new format luxury hotel.</p>
        </div>
        <div class="footer-col">
          <h4>Navigation</h4>
          <a href="/">Home</a>
          <a href="/rooms">Rooms</a>
          <a href="/booking">Booking</a>
        </div>
      </div>
      <div class="footer-bottom">
        <p>&copy; 2026 Aurelian Hotel &amp; Resorts.</p>
      </div>
    </div>
  </footer>

  <script type="text/babel" src="/public/js/profile.jsx"></script>
