{{define "admin.html"}}
<!DOCTYPE html>
<html lang="en" translate="no">
<head>
  <meta charset="UTF-8"/>
  <meta name="google" content="notranslate"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Panel — Aurelian Hotel</title>
  <link rel="stylesheet" href="/public/css/style.css">
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    .admin-layout {
      display: flex;
      min-height: 100vh;
    }
    .admin-sidebar {
      width: 250px;
      background: var(--color-primary);
      color: #fff;
      padding: 1.5rem;
      position: fixed;
      height: 100vh;
      overflow-y: auto;
    }
    .admin-sidebar h2 {
      font-size: 1.5rem;
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid rgba(255,255,255,0.2);
    }
    .admin-nav a {
      display: block;
      padding: 0.75rem 1rem;
      color: rgba(255,255,255,0.8);
      text-decoration: none;
      border-radius: var(--radius-md);
      margin-bottom: 0.5rem;
      transition: all 0.2s;
    }
    .admin-nav a:hover, .admin-nav a.active {
      background: rgba(255,255,255,0.15);
      color: #fff;
    }
    .admin-main {
      flex: 1;
      margin-left: 250px;
      padding: 2rem;
      background: var(--color-bg-alt);
    }
    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
    }
    .admin-header h1 {
      font-size: 1.75rem;
      color: var(--color-text);
    }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1.5rem;
      margin-bottom: 2rem;
    }
    .stat-card {
      background: #fff;
      padding: 1.5rem;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
    }
    .stat-card h3 {
      font-size: 0.875rem;
      color: var(--color-text-muted);
      margin-bottom: 0.5rem;
    }
    .stat-card .value {
      font-size: 2rem;
      font-weight: 600;
      color: var(--color-primary);
    }
    .admin-section {
      background: #fff;
      padding: 1.5rem;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
      margin-bottom: 1.5rem;
      display: none;
    }
    .admin-section.active {
      display: block;
    }
    .admin-section h2 {
      font-size: 1.25rem;
      margin-bottom: 1rem;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid var(--color-border);
    }
    .admin-table {
      width: 100%;
      border-collapse: collapse;
    }
    .admin-table th, .admin-table td {
      padding: 0.75rem;
      text-align: left;
      border-bottom: 1px solid var(--color-border);
    }
    .admin-table th {
      font-weight: 600;
      color: var(--color-text-muted);
      font-size: 0.875rem;
    }
    .admin-table tr:hover {
      background: var(--color-bg-alt);
    }
    .badge {
      display: inline-block;
      padding: 0.25rem 0.5rem;
      border-radius: var(--radius-sm);
      font-size: 0.75rem;
      font-weight: 500;
    }
    .badge-success { background: #dcfce7; color: #166534; }
    .badge-warning { background: #fef3c7; color: #92400e; }
    .badge-danger { background: #fee2e2; color: #991b1b; }
    .badge-info { background: #dbeafe; color: #1e40af; }
    .btn-sm {
      padding: 0.25rem 0.5rem;
      font-size: 0.75rem;
    }
    .admin-form {
      display: grid;
      gap: 1rem;
      max-width: 500px;
    }
    .admin-form .form-group {
      display: flex;
      flex-direction: column;
    }
    .admin-form label {
      font-size: 0.875rem;
      margin-bottom: 0.25rem;
      color: var(--color-text-muted);
    }
    .admin-form input, .admin-form select {
      padding: 0.5rem;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
    }
    .image-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 1rem;
    }
    .image-card {
      position: relative;
      border-radius: var(--radius-md);
      overflow: hidden;
      aspect-ratio: 4/3;
    }
    .image-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .image-card .delete-btn {
      position: absolute;
      top: 0.5rem;
      right: 0.5rem;
      background: #ef4444;
      color: white;
      border: none;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .image-card:hover .delete-btn {
      opacity: 1;
    }
    .upload-zone {
      border: 2px dashed var(--color-border);
      border-radius: var(--radius-lg);
      padding: 2rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .upload-zone:hover {
      border-color: var(--color-primary);
    }
    .tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }
    .tab-btn {
      padding: 0.5rem 1rem;
      border: none;
      background: var(--color-bg-alt);
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: all 0.2s;
    }
    .tab-btn.active {
      background: var(--color-primary);
      color: white;
    }
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 2px;
      background: var(--color-border);
      border-radius: var(--radius-md);
      overflow: hidden;
    }
    .calendar-day {
      background: white;
      padding: 0.5rem;
      min-height: 80px;
      font-size: 0.75rem;
    }
    .calendar-day.header {
      background: var(--color-bg-alt);
      font-weight: 600;
      min-height: auto;
      text-align: center;
    }
    .calendar-booking {
      background: var(--color-primary);
      color: white;
      padding: 2px 4px;
      border-radius: 2px;
      margin-top: 2px;
      font-size: 0.625rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .modal-content {
      background: white;
      padding: 2rem;
      border-radius: var(--radius-lg);
      max-width: 500px;
      width: 90%;
      max-height: 90vh;
      overflow-y: auto;
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }
    .modal-close {
      background: none;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      color: var(--color-text-muted);
    }
    @media (max-width: 768px) {
      .admin-sidebar {
        width: 100%;
        height: auto;
        position: relative;
      }
      .admin-main {
        margin-left: 0;
      }
      .admin-layout {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="admin-layout">
    <!-- Sidebar -->
    <aside class="admin-sidebar">
      <h2>Aurelian<span style="color:var(--color-secondary)">.</span> Admin</h2>
      <nav class="admin-nav">
        <a href="#" data-section="dashboard" class="active">📊 Dashboard</a>
        <a href="#" data-section="rooms">🛏️ Rooms</a>
        <a href="#" data-section="room-types">📁 Room Types</a>
        <a href="#" data-section="bookings">📅 Bookings</a>
        <a href="#" data-section="calendar">🗓️ Calendar</a>
        <a href="#" data-section="services">🍽️ Services</a>
        <a href="#" data-section="packages">📦 Packages</a>
        <a href="#" data-section="users">👥 Users</a>
        <a href="#" data-section="reviews">⭐ Reviews</a>
        <a href="#" data-section="images">🖼️ Images</a>
        <a href="/" style="margin-top: 2rem; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 1rem;">← Back to Site</a>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="admin-main">
      <div id="adminRoot"></div>
    </main>
  </div>

  <!-- React App Data -->
  <script>
    window.ADMIN_DATA = {
      rooms: {{json .Rooms}},
      roomTypes: {{json .RoomTypes}},
      services: {{json .Services}},
      packages: {{json .Packages}}
    };
  </script>
  <script type="text/babel" src="/public/js/admin.jsx"></script>
</body>
</html>
{{end}}
