<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Create your HotelStay account">
  <title>Create Account - HotelStay</title>
  <link rel="stylesheet" href="../public/css/style.css">
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="header-container">
      <a href="home.html" class="logo">
        <div class="logo-icon">H</div>
        HotelStay
      </a>
      <nav class="main-nav">
        <ul>
          <li><a href="home.html">Home</a></li>
          <li><a href="rooms.html">Rooms</a></li>
          <li><a href="contact.html">Contact</a></li>
          <li><a href="profile.html">My Bookings</a></li>
          <li><a href="login.html" class="nav-cta">Sign In</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <!-- Main Content -->
  <section class="auth-section">
    <div class="container">
      <div class="auth-card">
        <div class="auth-header">
          <h1 class="auth-title">Create Account</h1>
          <p class="auth-subtitle">Join HotelStay to start booking your perfect stays</p>
        </div>

        <form class="auth-form" action="login.html" method="post">
          <div class="form-group">
            <label for="fullname" class="form-label">Full Name</label>
            <input 
              type="text" 
              id="fullname" 
              name="fullname" 
              class="form-input" 
              placeholder="John Smith"
              required
              autocomplete="name">
          </div>

          <div class="form-group">
            <label for="email" class="form-label">Email Address</label>
            <input 
              type="email" 
              id="email" 
              name="email" 
              class="form-input" 
              placeholder="your.email@example.com"
              required
              autocomplete="email">
          </div>

          <div class="form-group">
            <label for="phone" class="form-label">Phone Number</label>
            <input 
              type="tel" 
              id="phone" 
              name="phone" 
              class="form-input" 
              placeholder="+1 (234) 567-890"
              autocomplete="tel">
          </div>

          <div class="form-group">
            <label for="password" class="form-label">Password</label>
